<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexus Change | Câmbio Inteligente</title>

  <style>
    :root {
      --bg-white: #ffffff;
      --text-dark: #1a1a1a;
      --nexus-blue: #1a4571;
    }

    body { 
      background-color: var(--bg-white); 
      margin: 0; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* Menu Hambúrguer Minimalista */
    .menu-toggle {
      position: absolute;
      top: 30px;
      left: 25px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .line { 
      width: 30px; height: 3px; 
      background-color: #ffffff; 
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Área do React - O HeroSlider agora renderiza nativamente aqui dentro */
    #root { 
      flex: 1;
      width: 100%;
      max-width: 1200px; 
      margin: 0 auto; /* Ajustado para o alinhamento do novo Hero do React */
      padding: 0 20px 50px;
      z-index: 20;
      background: transparent !important;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    
    Tawk_API.onLoad = function(){
        Tawk_API.hideWidget();
    };

    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/69ee45d4e7948f1c3a39a08f/default';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
  </script>
</body>
</html>
